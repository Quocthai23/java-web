<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${pageTitle} ?: 'Cửa hàng Quần áo'">Cửa hàng Quần áo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #4f46e5;
      --secondary-color: #6366f1;
      --accent-color: #f43f5e;
      --bg-color: #f8fafc;
      --sidebar-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    /* Header Styling */
    header {
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      color: white;
      padding: 1.5rem 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      margin-bottom: 2rem;
    }

    /* Sidebar Styling */
    .sidebar-container {
      background-color: var(--sidebar-bg);
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      padding: 1.25rem;
      min-height: calc(100vh - 250px);
    }

    .nav-level-1 { font-weight: 700; color: var(--text-main); margin-top: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .nav-level-2 { font-weight: 600; color: var(--primary-color); margin-left: 0.5rem; }
    .nav-level-3 { font-weight: 400; color: var(--text-muted); margin-left: 1.5rem; font-size: 0.9rem; transition: all 0.2s; }
    
    .nav-link-custom {
      display: flex;
      align-items: center;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      margin-bottom: 0.25rem;
    }
    
    .nav-link-custom:hover {
      background-color: #f1f5f9;
      color: var(--primary-color);
    }
    
    .nav-link-custom.active {
      background-color: var(--primary-color);
      color: white !important;
    }

    /* Main Content */
    .main-content {
      background-color: #ffffff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* Footer */
    footer {
      background-color: #1e293b;
      color: #94a3b8;
      padding: 2.5rem 0;
      margin-top: 3rem;
    }

    .btn-primary { background-color: var(--primary-color); border: none; }
    .btn-primary:hover { background-color: var(--secondary-color); }
    
    .card { border: none; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border-radius: 10px; }
  </style>
</head>
<body>
	<div th:replace="~{fragments/header :: header}"></div>

	<div class="container-fluid mt-3">
	  <div class="row g-3">

	    <div class="col-md-3 col-lg-2">
	      <div class="sidebar" th:replace="~{fragments/sidebar :: sidebar}"></div>
	    </div>

	    <div class="col-md-9 col-lg-10">
	      <div class="main-content">
	        <div th:replace="~{${contentTemplate} :: ${contentFragment}}"></div>
	      </div>
	    </div>

	  </div>
	</div>

	<div th:replace="~{fragments/footer :: footer}"></div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
	
</body>
</html>
